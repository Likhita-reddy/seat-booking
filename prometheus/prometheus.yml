global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'users-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['users-service:8081']

  - job_name: 'booking-service-1'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['booking-service-1:8082']

  - job_name: 'booking-service-2'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['booking-service-2:8082']

  - job_name: 'booking-service-3'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['booking-service-3:8082']

  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payment-service:8083']